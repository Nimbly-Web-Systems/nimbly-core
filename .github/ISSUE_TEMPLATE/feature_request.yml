name: Feature request
description: Suggest a small improvement or missing building block.
title: "feat: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to build or improve?
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current workaround
      description: How do you handle this today?
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would a minimal Nimbly-style solution look like?
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Add project details, examples, or related docs.
