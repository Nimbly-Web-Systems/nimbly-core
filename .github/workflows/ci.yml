name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ext
        run: mkdir -p ext && cp core/cli/setup/tailwind.theme.js ext/tailwind.theme.js && cp core/cli/setup/theme.css ext/theme.css

      - name: Build assets
        run: npm run build

      - name: Lint PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y -q php-cli php-mbstring
          find core -name '*.php' -print0 | xargs -0 -n1 php -l

  e2e:
    runs-on: ubuntu-latest
    env:
      COMPOSE_PROJECT_NAME: nimbly
      NIMBLY_CONTAINER_NAME: nimbly-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('package-lock.json') }}

      - name: Create .env
        run: |
          PEPPER=$(grep 'SetEnv PEPPER' .htaccess | awk '{print $3}')
          printf 'APP_ENV=dev\nBASE_PATH=/\nPEPPER=%s\nSITE_NAME=Nimbly\n' "$PEPPER" > .env

      - name: Prepare ext
        run: mkdir -p ext && cp core/cli/setup/tailwind.theme.js ext/tailwind.theme.js && cp core/cli/setup/theme.css ext/theme.css

      - name: Build assets
        run: npm run build

      - uses: docker/setup-buildx-action@v3

      - name: Build dev image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/dev/Dockerfile
          load: true
          tags: nimbly-nimbly:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start dev container
        run: docker compose -f docker/dev/docker-compose.yml up -d
        env:
          COMPOSE_PROJECT_NAME: nimbly

      - name: Wait for server
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost/ -o /dev/null && { echo "Server ready after ${i}s"; break; }
            sleep 2
          done

      - name: System setup
        env:
          SITE_NAME: Nimbly
          ADMIN_EMAIL: admin@ci.test
          ADMIN_PASSWORD: Admin123!
        run: ./nimbly --docker system:setup

      - name: Run E2E tests
        run: ./nimbly --docker test:run

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: core/tests/playwright-report/
          retention-days: 14
