name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare ext
        run: mkdir -p ext && cp core/cli/setup/tailwind.theme.js ext/tailwind.theme.js && cp core/cli/setup/theme.css ext/theme.css

      - name: Build assets
        run: npm run build

      - name: Lint PHP
        run: |
          sudo apt-get update
          sudo apt-get install -y -q php-cli php-mbstring
          find core -name '*.php' -print0 | xargs -0 -n1 php -l
