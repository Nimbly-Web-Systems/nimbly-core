; Nimbly PHP settings — migrated from .htaccess php_flag / php_value directives.
; Dropped: register_globals, magic_quotes_gpc, magic_quotes_sybase (removed PHP 7.0),
;          mbstring.http_input, mbstring.http_output (deprecated PHP 5.6, always "pass").

session.auto_start = Off
mbstring.encoding_translation = Off
zlib.output_compression = 16386
session.gc_maxlifetime = 2592000
session.cookie_lifetime = 2592000
session.gc_probability = 1
; Absolute path required — .htaccess allowed a relative path, php.ini does not.
error_log = /var/www/nimbly/ext/data/.tmp/logs/system.log
memory_limit = 2048M
post_max_size = 12M
upload_max_filesize = 10M
